name = "hfa-submissions-proxy"
main = "src/worker.js"
compatibility_date = "2025-10-01"

# D1 inbox for Hallie Command Center (GET /api/inbox + Bearer INBOX_SECRET).
# Create: npx wrangler d1 create hfa_submissions_inbox
# Apply schema: npx wrangler d1 migrations apply hfa_submissions_inbox --remote
# Then paste database_id below and: npx wrangler secret put INBOX_SECRET
[[d1_databases]]
binding = "SUBMISSIONS_DB"
database_name = "hfa_submissions_inbox"
database_id = "8a87766e-60a1-42f2-8f78-828d1e5a2eb0"

# File uploads (memoriam photos, etc.): npx wrangler r2 bucket create hfa-submissions-uploads
[[r2_buckets]]
binding = "INBOX_UPLOADS"
bucket_name = "hfa-submissions-uploads"

[vars]
# Comma-separated origins allowed to call this API
# Comma-separated; must match browser Origin (scheme + host + port). No trailing slashes.
ALLOWED_ORIGINS = "https://hallieforanimals.org, https://www.hallieforanimals.org, https://hallieforanimals.github.io, http://localhost:3000, http://localhost:8000, http://127.0.0.1:5500, http://localhost:5500"
TO_EMAIL = "submissions@hallieforanimals.org"
FROM_EMAIL = "no-reply@hallieforanimals.org"
FROM_NAME  = "HFA Submissions Form"