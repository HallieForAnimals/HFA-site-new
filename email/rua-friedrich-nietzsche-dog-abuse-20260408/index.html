    var MAILTO = "mailto:bpambfv@pm.pr.gov.br,dpsaojosepinhais@pc.pr.gov.br,servicossemma@sjp.pr.gov.br,educacao.ambiental@sjp.pr.gov.br?subject=Maltreatment%20de%20um%20c%C3%A3o%20de%20rua%20em%20S%C3%A3o%20Jos%C3%A9%20dos%20Pinhais%2FAbuse%20of%20a%20stray%20dog%20in%20S%C3%A3o%20Jos%C3%A9%20dos%20Pinhais&body=A%20quem%20possa%20interessar%2C%0A%0AVenho%20por%20meio%20desta%20apresentar%20uma%20den%C3%BAncia%20formal%20de%20maus-tratos%20a%20animais%20(Art.%2032%20da%20Lei%20Federal%20n%C2%BA%209.605%2F98)%2C%20ocorridos%20na%20tarde%20da%20segunda-feira%2C%206%20de%20abril%20de%202026%2C%20na%20Rua%20Friedrich%20Nietzsche%2C%20no%20bairro%20Aristocrata%2C%20em%20S%C3%A3o%20Jos%C3%A9%20dos%20Pinhais%2C%20Paran%C3%A1.%0A%0AUm%20c%C3%A3o%20comunit%C3%A1rio%2C%20d%C3%B3cil%20e%20cuidado%20pelos%20moradores%2C%20foi%20violentamente%20chutado%20na%20mand%C3%ADbula%20por%20um%20coletor%20de%20lixo%2C%20fraturando%20o%20osso.%20O%20incidente%20foi%20capturado%20por%20uma%20c%C3%A2mera%20de%20seguran%C3%A7a%2C%20e%20o%20v%C3%ADdeo%20est%C3%A1%20circulando%20amplamente%20nas%20redes%20sociais.%0A%0AA%20empresa%20j%C3%A1%20demitiu%20o%20agressor%20e%20se%20comprometeu%20a%20arcar%20com%20os%20custos%20do%20tratamento%20veterin%C3%A1rio%2C%20o%20que%20%C3%A9%20insuficiente.%20Solicitamos%20o%20registro%20imediato%20de%20um%20boletim%20de%20ocorr%C3%AAncia%2C%20a%20abertura%20de%20um%20inqu%C3%A9rito%20policial%20e%20todas%20as%20medidas%20cab%C3%ADveis%20para%20garantir%20que%20o%20agressor%20seja%20responsabilizado%20criminalmente.%0A%0AProva%20em%20v%C3%ADdeo%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1H6plO1R4cblxWjXvNsYx8jkNnlitExjS%2Fview%3Fusp%3Dsharing%0A%0AAtenciosamente%2C%0A%0A%0A%0AEquipe%20%40HallieForAnimals%0Acontact%40hallieforanimals.org%0A%0A%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AI%20hereby%20file%20a%20formal%20complaint%20of%20animal%20abuse%20(Art.%2032%20of%20Federal%20Law%209.605%2F98)%2C%20which%20occurred%20on%20the%20afternoon%20of%20Monday%2C%20April%206%2C%202026%2C%20on%20Friedrich%20Nietzsche%20Street%2C%20in%20the%20Aristocrata%20neighborhood%20of%20S%C3%A3o%20Jos%C3%A9%20dos%20Pinhais%2C%20Paran%C3%A1.%0A%0AA%20community%20dog%2C%20docile%20and%20cared%20for%20by%20the%20residents%2C%20was%20violently%20kicked%20in%20the%20jaw%20by%20a%20garbage%20collector%2C%20fracturing%20the%20bone.%20The%20incident%20was%20captured%20on%20a%20security%20camera%2C%20and%20the%20video%20is%20widely%20circulating%20on%20social%20media.%0A%0AThe%20company%20has%20already%20fired%20the%20perpetrator%20and%20committed%20to%20paying%20for%20veterinary%20treatment%2C%20which%20is%20insufficient.%20We%20request%20the%20immediate%20filing%20of%20a%20police%20report%2C%20the%20opening%20of%20a%20police%20investigation%2C%20and%20all%20appropriate%20measures%20to%20ensure%20the%20perpetrator%20faces%20criminal%20charges.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1H6plO1R4cblxWjXvNsYx8jkNnlitExjS%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
    var RETURN_TO = "https://hallieforanimals.org/recent.html#c-rua-friedrich-nietzsche-dog-abuse-20260408";
    var wentBack = false;
    var launched = false;
    var blurredAfterLaunch = false;
    function goMail() {
      var a = document.getElementById('open');
      if (a) {
        try { a.click(); } catch (e) { /* ignore */ }
      }
      try {
        window.location.href = MAILTO;
      } catch (e) {
        try { window.location.assign(MAILTO); } catch (e2) { /* ignore */ }
      }
      launched = true;
    }
    setTimeout(goMail, 200);
    function goBack() {
      if (wentBack) return;
      wentBack = true;
      try { location.assign(RETURN_TO); } catch (e) { location.href = RETURN_TO; }
    }
    window.addEventListener('blur', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('focus', function () {
      if (blurredAfterLaunch) setTimeout(goBack, 150);
    });
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    window.addEventListener('pageshow', function (e) {
      if (e.persisted && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    var done = document.getElementById('done-return');
    if (done) done.addEventListener('click', function (e) { e.preventDefault(); goBack(); });
  })();
  </script>
