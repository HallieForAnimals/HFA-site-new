%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AWe%20write%20to%20you%20as%20global%20citizens%2C%20animal%20advocates%2C%20and%20concerned%20individuals%20to%20urge%20immediate%20and%20decisive%20action%20to%20end%20Vietnam's%20dog%20and%20cat%20meat%20trade.%20This%20industry%20causes%20immense%20suffering%20to%20millions%20of%20animals%2C%20poses%20serious%20risks%20to%20public%20health%2C%20and%20increasingly%20conflicts%20with%20the%20values%20and%20aspirations%20of%20Vietnamese%20society%20itself.%0A%0AThe%20scale%20of%20suffering%20is%20significant.%20Over%20six%20million%20dogs%20and%20one%20million%20cats%20are%20slaughtered%20in%20Vietnam%20every%20year.%20Many%20are%20stolen%20pets%20or%20community%20animals%2C%20transported%20in%20cruel%20conditions%20and%20subjected%20to%20methods%20of%20slaughter%20that%20cause%20prolonged%20pain%20and%20distress.%0A%0ACritically%2C%20Vietnamese%20citizens%20themselves%20are%20leading%20the%20call%20for%20change.%20A%202021%20survey%20by%20FOUR%20PAWS%20found%20that%2091%25%20of%20Vietnamese%20people%20believe%20the%20trade%20should%20be%20banned%20or%20discouraged%2C%20and%2095%25%20say%20it%20is%20not%20part%20of%20Vietnamese%20culture.%20Cities%20like%20Hanoi%20are%20already%20taking%20meaningful%20steps%20to%20phase%20out%20dog%20meat%20consumption%20%E2%80%94%20demonstrating%20that%20reform%20is%20both%20possible%20and%20publicly%20supported.%0A%0AThe%20trade%20also%20operates%20largely%20in%20legal%20grey%20areas.%20Despite%20existing%20regulations%2C%20enforcement%20remains%20inconsistent%2C%20and%20criminal%20networks%20continue%20to%20traffic%20animals%20across%20provinces%2C%20stealing%20pets%20and%20evading%20accountability.%0A%0AVietnam%20has%20an%20opportunity%20to%20be%20a%20regional%20leader%20on%20this%20issue.%20Countries%20across%20Asia%20%E2%80%94%20including%20South%20Korea%2C%20which%20recently%20passed%20a%20landmark%20ban%20on%20the%20dog%20meat%20industry%20%E2%80%94%20are%20taking%20decisive%20action.%20Vietnam%20can%20and%20should%20follow%20this%20path%2C%20for%20the%20benefit%20of%20animals%2C%20public%20health%2C%20and%20its%20standing%20in%20the%20international%20community.%0A%0AWe%20respectfully%20urge%20your%20office%20to%3A%0A%0A1.%20Support%20a%20nationwide%20ban%20on%20the%20dog%20and%20cat%20meat%20trade%2C%20with%20clear%20penalties%20for%20violations.%0A2.%20Strengthen%20enforcement%20of%20existing%20laws%2C%20including%20action%20against%20illegal%20trafficking%2C%20slaughter%2C%20and%20sale%20of%20dogs%20and%20cats%20for%20meat.%0A3.%20Fund%20transition%20programmes%20to%20support%20workers%20in%20the%20trade%20in%20moving%20to%20humane%20and%20sustainable%20livelihoods.%0A4.%20Invest%20in%20public%20education%20campaigns%20highlighting%20both%20the%20animal%20welfare%20concerns%20and%20the%20public%20health%20risks%20associated%20with%20the%20trade.%0A%0AWe%20believe%20Vietnam's%20government%20shares%20our%20commitment%20to%20a%20compassionate%20and%20forward-thinking%20society.%20We%20ask%20you%20to%20translate%20that%20commitment%20into%20action.%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org https://hallieforanimals.org/ongoing.html https://hallieforanimals.org/ongoing.html (same as return) "mailto:hotro@moh.gov.vn,hotro@quochoi.vn,vanphong@vietnamembassy.org.uk,vanphong@vietnamembassy.us,vanphongcuc@dah.gov.vn?subject=Vi%E1%BB%87t%20Nam%20ph%E1%BA%A3i%20ch%E1%BA%A5m%20d%E1%BB%A9t%20ho%E1%BA%A1t%20%C4%91%E1%BB%99ng%20bu%C3%B4n%20b%C3%A1n%20th%E1%BB%8Bt%20ch%C3%B3%20v%C3%A0%20m%C3%A8o%20t%C3%A0n%20b%E1%BA%A1o%2FVietnam%20Must%20End%20the%20Brutal%20Dog%20and%20Cat%20Meat%20Trade&body=K%C3%ADnh%20g%E1%BB%ADi%20qu%C3%BD%20v%E1%BB%8B%2C%0A%0ACh%C3%BAng%20t%C3%B4i%20vi%E1%BA%BFt%20th%C6%B0%20n%C3%A0y%20v%E1%BB%9Bi%20t%C6%B0%20c%C3%A1ch%20l%C3%A0%20nh%E1%BB%AFng%20c%C3%B4ng%20d%C3%A2n%20to%C3%A0n%20c%E1%BA%A7u%2C%20nh%E1%BB%AFng%20ng%C6%B0%E1%BB%9Di%20b%E1%BA%A3o%20v%E1%BB%87%20%C4%91%E1%BB%99ng%20v%E 0Acontact%40hallieforanimals.org%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AWe%20write%20to%20you%20as%20global%20citizens%2C%20animal%20advocates%2C%20and%20concerned%20individuals%20to%20urge%20immediate%20and%20decisive%20action%20to%20end%20Vietnam's%20dog%20and%20cat%20meat%20trade.%20This%20industry%20causes%20immense%20suffering%20to%20millions%20of%20animals%2C%20poses%20serious%20risks%20to%20public%20health%2C%20and%20increasingly%20conflicts%20with%20the%20values%20and%20aspirations%20of%20Vietnamese%20society%20itself.%0A%0AThe%20scale%20of%20suffering%20is%20significant.%20Over%20six%20million%20dogs%20and%20one%20million%20cats%20are%20slaughtered%20in%20Vietnam%20every%20year.%20Many%20are%20stolen%20pets%20or%20community%20animals%2C%20transported%20in%20cruel%20conditions%20and%20subjected%20to%20methods%20of%20slaughter%20that%20cause%20prolonged%20pain%20and%20distress.%0A%0ACritically%2C%20Vietnamese%20citizens%20themselves%20are%20leading%20the%20call%20for%20change.%20A%202021%20survey%20by%20FOUR%20PAWS%20found%20that%2091%25%20of%20Vietnamese%20people%20believe%20the%20trade%20should%20be%20banned%20or%20discouraged%2C%20and%2095%25%20say%20it%20is%20not%20part%20of%20Vietnamese%20culture.%20Cities%20like%20Hanoi%20are%20already%20taking%20meaningful%20steps%20to%20phase%20out%20dog%20meat%20consumption%20%E2%80%94%20demonstrating%20that%20reform%20is%20both%20possible%20and%20publicly%20supported.%0A%0AThe%20trade%20also%20operates%20largely%20in%20legal%20grey%20areas.%20Despite%20existing%20regulations%2C%20enforcement%20remains%20inconsistent%2C%20and%20criminal%20networks%20continue%20to%20traffic%20animals%20across%20provinces%2C%20stealing%20pets%20and%20evading%20accountability.%0A%0AVietnam%20has%20an%20opportunity%20to%20be%20a%20regional%20leader%20on%20this%20issue.%20Countries%20across%20Asia%20%E2%80%94%20including%20South%20Korea%2C%20which%20recently%20passed%20a%20landmark%20ban%20on%20the%20dog%20meat%20industry%20%E2%80%94%20are%20taking%20decisive%20action.%20Vietnam%20can%20and%20should%20follow%20this%20path%2C%20for%20the%20benefit%20of%20animals%2C%20public%20health%2C%20and%20its%20standing%20in%20the%20international%20community.%0A%0AWe%20respectfully%20urge%20your%20office%20to%3A%0A%0A1.%20Support%20a%20nationwide%20ban%20on%20the%20dog%20and%20cat%20meat%20trade%2C%20with%20clear%20penalties%20for%20violations.%0A2.%20Strengthen%20enforcement%20of%20existing%20laws%2C%20including%20action%20against%20illegal%20trafficking%2C%20slaughter%2C%20and%20sale%20of%20dogs%20and%20cats%20for%20meat.%0A3.%20Fund%20transition%20programmes%20to%20support%20workers%20in%20the%20trade%20in%20moving%20to%20humane%20and%20sustainable%20livelihoods.%0A4.%20Invest%20in%20public%20education%20campaigns%20highlighting%20both%20the%20animal%20welfare%20concerns%20and%20the%20public%20health%20risks%20associated%20with%20the%20trade.%0A%0AWe%20believe%20Vietnam's%20government%20shares%20our%20commitment%20to%20a%20compassionate%20and%20forward-thinking%20society.%20We%20ask%20you%20to%20translate%20that%20commitment%20into%20action.%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org" rel="nofollow">Open email</a>

.org%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AWe%20write%20to%20you%20as%20global%20citizens%2C%20animal%20advocates%2C%20and%20concerned%20individuals%20to%20urge%20immediate%20and%20decisive%20action%20to%20end%20Vietnam's%20dog%20and%20cat%20meat%20trade.%20This%20industry%20causes%20immense%20suffering%20to%20millions%20of%20animals%2C%20poses%20serious%20risks%20to%20public%20health%2C%20and%20increasingly%20conflicts%20with%20the%20values%20and%20aspirations%20of%20Vietnamese%20society%20itself.%0A%0AThe%20scale%20of%20suffering%20is%20significant.%20Over%20six%20million%20dogs%20and%20one%20million%20cats%20are%20slaughtered%20in%20Vietnam%20every%20year.%20Many%20are%20stolen%20pets%20or%20community%20animals%2C%20transported%20in%20cruel%20conditions%20and%20subjected%20to%20methods%20of%20slaughter%20that%20cause%20prolonged%20pain%20and%20distress.%0A%0ACritically%2C%20Vietnamese%20citizens%20themselves%20are%20leading%20the%20call%20for%20change.%20A%202021%20survey%20by%20FOUR%20PAWS%20found%20that%2091%25%20of%20Vietnamese%20people%20believe%20the%20trade%20should%20be%20banned%20or%20discouraged%2C%20and%2095%25%20say%20it%20is%20not%20part%20of%20Vietnamese%20culture.%20Cities%20like%20Hanoi%20are%20already%20taking%20meaningful%20steps%20to%20phase%20out%20dog%20meat%20consumption%20%E2%80%94%20demonstrating%20that%20reform%20is%20both%20possible%20and%20publicly%20supported.%0A%0AThe%20trade%20also%20operates%20largely%20in%20legal%20grey%20areas.%20Despite%20existing%20regulations%2C%20enforcement%20remains%20inconsistent%2C%20and%20criminal%20networks%20continue%20to%20traffic%20animals%20across%20provinces%2C%20stealing%20pets%20and%20evading%20accountability.%0A%0AVietnam%20has%20an%20opportunity%20to%20be%20a%20regional%20leader%20on%20this%20issue.%20Countries%20across%20Asia%20%E2%80%94%20including%20South%20Korea%2C%20which%20recently%20passed%20a%20landmark%20ban%20on%20the%20dog%20meat%20industry%20%E2%80%94%20are%20taking%20decisive%20action.%20Vietnam%20can%20and%20should%20follow%20this%20path%2C%20for%20the%20benefit%20of%20animals%2C%20public%20health%2C%20and%20its%20standing%20in%20the%20international%20community.%0A%0AWe%20respectfully%20urge%20your%20office%20to%3A%0A%0A1.%20Support%20a%20nationwide%20ban%20on%20the%20dog%20and%20cat%20meat%20trade%2C%20with%20clear%20penalties%20for%20violations.%0A2.%20Strengthen%20enforcement%20of%20existing%20laws%2C%20including%20action%20against%20illegal%20trafficking%2C%20slaughter%2C%20and%20sale%20of%20dogs%20and%20cats%20for%20meat.%0A3.%20Fund%20transition%20programmes%20to%20support%20workers%20in%20the%20trade%20in%20moving%20to%20humane%20and%20sustainable%20livelihoods.%0A4.%20Invest%20in%20public%20education%20campaigns%20highlighting%20both%20the%20animal%20welfare%20concerns%20and%20the%20public%20health%20risks%20associated%20with%20the%20trade.%0A%0AWe%20believe%20Vietnam's%20government%20shares%20our%20commitment%20to%20a%20compassionate%20and%20forward-thinking%20society.%20We%20ask%20you%20to%20translate%20that%20commitment%20into%20action.%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
