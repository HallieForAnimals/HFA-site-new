ther%20violent%20offenses.%0A%0AAllowing%20this%20case%20to%20be%20dismissed%20without%20vigorous%20prosecution%20potentially%20endangers%20the%20community%2C%20especially%20animals%20in%20her%20care%20and%20any%20people%20who%20interact%20with%20her%20professionally%20or%20personally.%20Former%20clients%20have%20reportedly%20come%20forward%20with%20additional%20concerns%2C%20raising%20broader%20red%20flags%20about%20patterns%20of%20behavior.%0A%0AThe%20key%20failure%20appears%20to%20be%20reliance%20on%20Eastman%E2%80%99s%20ex-boyfriend%2C%20Christian%20Duran%20(who%20recorded%20the%20video%20and%20faces%20his%20own%20animal%20cruelty%20charge)%2C%20to%20authenticate%20the%20recording.%20Prosecutors%20could%20have%20easily%20used%20a%20digital%20forensics%20team%20to%20authenticate%20the%20video%20through%20metadata%20analysis%2C%20hash%20verification%20for%20tampering%2C%20and%20expert%20testimony%2C%20methods%20that%20are%20fully%20accepted%20under%20Massachusetts%20evidence%20rules%20(Guide%20to%20Evidence%20%C2%A7%C2%A7%20901%20and%201119)%20and%20routinely%20used%20for%20cell%20phone%20videos.%20Instead%20of%20securing%20Duran%E2%80%99s%20testimony%20via%20immunity%20or%20a%20plea%20deal%2C%20or%20pivoting%20to%20forensics%2C%20they%20let%20the%20case%20collapse.%20This%20was%20a%20preventable%20prosecutorial%20shortfall.%0A%0AI%20respectfully%20urge%20your%20office%2C%20through%20the%20Criminal%20Bureau%2C%20to%20review%20this%20case%20for%20possible%20refiling%20or%20further%20investigation.%20Prosecutorial%20discretion%20should%20not%20come%20at%20the%20expense%20of%20public%20safety%20or%20accountability%20for%20blatant%20violations%20caught%20on%20video.%0A%0AThank%20you%20for%20your%20attention%20to%20this%20important%20matter.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1iqQczQ7mUfrjeke-MkS1Q-YTiqxpY-El%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org https://hallie %20other%20violent%20offenses.%0A%0AAllowing%20this%20case%20to%20be%20dismissed%20without%20vigorous%20prosecution%20potentially%20endangers%20the%20community%2C%20especially%20animals%20in%20her%20care%20and%20any%20people%20who%20interact%20with%20her%20professionally%20or%20personally.%20Former%20clients%20have%20reportedly%20come%20forward%20with%20additional%20concerns%2C%20raising%20broader%20red%20flags%20about%20patterns%20of%20behavior.%0A%0AThe%20key%20failure%20appears%20to%20be%20reliance%20on%20Eastman%E2%80%99s%20ex-boyfriend%2C%20Christian%20Duran%20(who%20recorded%20the%20video%20and%20faces%20his%20own%20animal%20cruelty%20charge)%2C%20to%20authenticate%20the%20recording.%20Prosecutors%20could%20have%20easily%20used%20a%20digital%20forensics%20team%20to%20authenticate%20the%20video%20through%20metadata%20analysis%2C%20hash%20verification%20for%20tampering%2C%20and%20expert%20testimony%2C%20methods%20that%20are%20fully%20accepted%20under%20Massachusetts%20evidence%20rules%20(Guide%20to%20Evidence%20%C2%A7%C2%A7%20901%20and%201119)%20and%20routinely%20used%20for%20cell%20phone%20videos.%20Instead%20of%20securing%20Duran%E2%80%99s%20testimony%20via%20immunity%20or%20a%20plea%20deal%2C%20or%20pivoting%20to%20forensics%2C%20they%20let%20the%20case%20collapse.%20This%20was%20a%20preventable%20prosecutorial%20shortfall.%0A%0AI%20respectfully%20urge%20your%20office%2C%20through%20the%20Criminal%20Bureau%2C%20to%20review%20this%20case%20for%20possible%20refiling%20or%20further%20investigation.%20Prosecutorial%20discretion%20should%20not%20come%20at%20the%20expense%20of%20public%20safety%20or%20accountability%20for%20blatant%20violations%20caught%20on%20video.%0A%0AThank%20you%20for%20your%20attention%20to%20this%20important%20matter.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1iqQczQ7mUfrjeke-MkS1Q-YTiqxpY-El%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
    var RETURN_TO = "https://hallieforanimals.org/recent.html";
    var wentBack = false;
    var launched = false;
    var blurredAfterLaunch = false;
    var launchAtMs = 0;
    var ua = navigator.userAgent || '';
    var isInstagramIab = /Instagram/i.test(ua);
    function goMail() {
      var a = document.getElementById('open');
      if (a) {
        try { a.click(); } catch (e) { /* ignore */ }
      }
      try {
        window.location.href = MAILTO;
      } catch (e) {
        try { window.location.assign(MAILTO); } catch (e2) { /* ignore */ }
      }
      launched = true;
      launchAtMs = Date.now();
    }
    setTimeout(goMail, 200);
    function goBack() {
      if (wentBack) return;
      wentBack = true;
      try { location.assign(RETURN_TO); } catch (e) { location.href = RETURN_TO; }
    }
    window.addEventListener('blur', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('pagehide', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('focus', function () {
      var enoughDelay = launchAtMs > 0 && (Date.now() - launchAtMs) > 1200;
      if (blurredAfterLaunch || (isInstagramIab && launched && enoughDelay)) setTimeout(goBack, 150);
    });
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    window.addEventListener('pageshow', function (e) {
      if (e.persisted && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    // Instagram in-app browser can fail to emit blur/visibility after mail compose.
    if (isInstagramIab) {
      setTimeout(function () {
        if (launched && !wentBack) goBack();
      }, 15000);
    }
    var done = document.getElementById('done-return');
    if (done) done.addEventListener('click', function (e) { e.preventDefault(); goBack(); });
  })();
  </script>
