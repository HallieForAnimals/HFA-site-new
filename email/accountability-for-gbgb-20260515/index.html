3A%20A%20public%20statement%20confirming%20whether%20Romford's%20injury%20register%20contains%20an%20entry%20for%2011th%20May%202026%20relating%20to%20Roaming%20Tinder.%0A3%3A%20A%20public%20explanation%20for%20why%20the%20Race%204%20replay%20has%20been%20server-side%20invalidated%20while%20adjacent%20races%20remain%20accessible.%0A4%3A%20An%20immediate%20welfare%20check%20on%20Roaming%20Tinder%20and%20Marlene%20Westwood's%2023%20other%20dogs%20at%20her%20kennels%2C%20with%20the%20outcome%20publicly%20reported.%0A%0AGBGB%20Chairman%20Sir%20Philip%20Davies%20recently%20wrote%20in%20the%20Racing%20Post%3A%20%22To%20be%20clear%2C%20none%20of%20the%20arguments%20against%20our%20sport%20are%20grounded%20in%20evidence.%22%20This%20complaint%20is%20grounded%20in%20evidence.%0A%0AMore%20critically%3A%20Sir%20Philip%20simultaneously%20chairs%20Star%20Sports%20Group%2C%20a%20bookmaker%20which%20owns%20Star%20Pelaw%2C%20a%20GBGB-licensed%20track%20that%20the%20GBGB%20is%20responsible%20for%20inspecting%20and%20licensing.%20The%20chairman%20of%20the%20regulator%20has%20a%20direct%20financial%20interest%20in%20a%20track%20he%20regulates.%20The%20GBGB's%20own%20Impartiality%20Committee%20requires%20members%20to%20have%20no%20direct%20links%20to%20tracks.%20Their%20chairman%20is%20held%20to%20a%20lower%20standard%20than%20the%20committee%20beneath%20him.%0A%0ADEFRA%20and%20DCMS%20must%20confirm%20publicly%20whether%20this%20dual%20role%20was%20assessed%20prior%20to%20Sir%20Philip's%20appointment%20and%20whether%20it%20is%20compatible%20with%20the%20GBGB's%20obligations%20as%20an%20independent%20regulatory%20body.%20UKAS%20must%20confirm%20publicly%20whether%20it%20is%20compatible%20with%20the%20ISO%2017065%20accreditation%20the%20GBGB%20holds.%0A%0AA%20dog%20seized%20on%20live%20television.%20The%20footage%20was%20deleted.%20No%20welfare%20report%20appears%20to%20have%20been%20filed.%20The%20regulator's%20chairman%20has%20a%20financial%20stake%20in%20the%20industry%20he%20regulate     var MAILTO = "mailto:welfare@gbgb.org.uk,info@gbgb.org.uk,mark.bird@gbgb.org.uk,philip.davies@gbgb.org.uk,correspondence.section@defra.gov.uk,enquiries@dcms.gov.uk,andrew.rosindell.mp@parliament.uk,matt.gantley@ukas.com,info@ukas.com,pressoffice@league.org.uk?subject=Formal%20Welfare%20Complaint%20-%20Roaming%20Tinder%2C%20Romford%2C%2011th%20May%202026&body=To%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20to%20report%20a%20welfare%20incident%20at%20Romford%20Greyhound%20Stadium%20on%2011th%20May%202026%2C%20to%20raise%20concerns%20about%20the%20apparent%20failure%20to%20report%20it%20under%20GBGB%20Rules%20of%20Racing%2C%20and%20to%20flag%20a%20fundamental%20conflict%20of%20interest%20at%20the%20heart%20of%20the%20GBGB.%0A%0ADuring%20the%20live%20Premier%20Greyhound%20Racing%20broadcast%20of%20Race%204%2C%2012%3A01%2C%20Grade%20A8%20at%20Romford%20on%2011th%20May%202026%2C%20a%20greyhound%20collapsed%20and%20appeared%20to%20seize%20or%20have%20a%20heart%20attack%20on%20the%20far%20side%20of%20the%20track%20post-race.%20The%20incident%20is%20captured%20on%20broadcast%20at%20timestamp%2012%3A01%3A56%2C%20with%20race%20details%20and%20PGR%20branding%20clearly%20visible.%0A%0AThe%20dog%20is%20Roaming%20Tinder%2C%20winner%20of%20the%20race.%20Trained%20by%20Marlene%20Westwood%2C%20owned%20by%20Mr%20R%20G%20Batten.%0A%0AThe%20replay%20at%20https%3A%2F%2Fgreyhounds1.attheraces.com%2Fvideo%2Freplay%2F389131%20cannot%20be%20viewed.%20Races%203%20and%205%20from%20the%20same%20meeting%20play%20normally.%20Race%204%20alone%20returns%20this%20server-side%20response%3A%0A%0A%22ERROR%20RETURNED%20%7C%20INVALID_EVENT_ID%20~%20EventID%20is%20missing%20or%20invalid.%22%0A%0AStrongly%20indicating%20that%20the%20event%20has%20been%20actively%20invalidated.%0A%0AI%20request%20the%20following%3A%0A%0A1%3A%20A%20public%20statement%20confirming%20whether%20a%20trackside%20vet%20report%20was%20filed%20for%20this%20incident%20as%20required%20under%20GBGB%20Rules%20of%20Racing.%0A2%3A%20A%20public%20statement%20confirming%20whether%20Romford's%20injury%20register%20contains%20an%20entry%20for%2011th%20May%202026%20relating%20to%20Roaming%20Tinder.%0A3%3A%20A%20public%20explanation%20for%20why%20the%20Race%204%20replay%20has%20been%20server-side%20invalidated%20while%20adjacent%20races%20remain%20accessible.%0A4%3A%20An%20immediate%20welfare%20check%20on%20Roaming%20Tinder%20and%20Marlene%20Westwood's%2023%20other%20dogs%20at%20her%20kennels%2C%20with%20the%20outcome%20publicly%20reported.%0A%0AGBGB%20Chairman%20Sir%20Philip%20Davies%20recently%20wrote%20in%20the%20Racing%20Post%3A%20%22To%20be%20clear%2C%20none%20of%20the%20arguments%20against%20our%20sport%20are%20grounded%20in%20evidence.%22%20This%20complaint%20is%20grounded%20in%20evidence.%0A%0AMore%20critically%3A%20Sir%20Philip%20simultaneously%20chairs%20Star%20Sports%20Group%2C%20a%20bookmaker%20which%20owns%20Star%20Pelaw%2C%20a%20GBGB-licensed%20track%20that%20the%20GBGB%20is%20responsible%20for%20inspecting%20and%20licensing.%20The%20chairman%20of%20the%20regulator%20has%20a%20direct%20financial%20interest%20in%20a%20track%20he%20regulates.%20The%20GBGB's%20own%20Impartiality%20Committee%20requires%20members%20to%20have%20no%20direct%20links%20to%20tracks.%20Their%20chairman%20is%20held%20to%20a%20lower%20standard%20than%20the%20committee%20beneath%20him.%0A%0ADEFRA%20and%20DCMS%20must%20confirm%20publicly%20whether%20this%20dual%20role%20was%20assessed%20prior%20to%20Sir%20Philip's%20appointment%20and%20whether%20it%20is%20compatible%20with%20the%20GBGB's%20obligations%20as%20an%20independent%20regulatory%20body.%20UKAS%20must%20confirm%20publicly%20whether%20it%20is%20compatible%20with%20the%20ISO%2017065%20accreditation%20the%20GBGB%20holds.%0A%0AA%20dog%20seized%20on%20live%20television.%20The%20footage%20was%20deleted.%20No%20welfare%20report%20appears%20to%20have%20been%20filed.%20The%20regulator's%20chairman%20has%20a%20financial%20stake%20in%20the%20industry%20he%20regulates%20and%20has%20publicly%20dismissed%20all%20welfare%20concerns%20as%20baseless.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1XToSX5gtdWySnL5unOrCfmm4z97vcjX2%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
    var RETURN_TO = "https://hallieforanimals.org/recent.html";
    var wentBack = false;
    var launched = false;
    var blurredAfterLaunch = false;
    var launchAtMs = 0;
    var ua = navigator.userAgent || '';
    var isInstagramIab = /Instagram/i.test(ua);
    function goMail() {
      var a = document.getElementById('open');
      if (a) {
        try { a.click(); } catch (e) { /* ignore */ }
      }
      try {
        window.location.href = MAILTO;
      } catch (e) {
        try { window.location.assign(MAILTO); } catch (e2) { /* ignore */ }
      }
      launched = true;
      launchAtMs = Date.now();
    }
    setTimeout(goMail, 200);
    function goBack() {
      if (wentBack) return;
      wentBack = true;
      try { location.assign(RETURN_TO); } catch (e) { location.href = RETURN_TO; }
    }
    window.addEventListener('blur', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('pagehide', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('focus', function () {
      var enoughDelay = launchAtMs > 0 && (Date.now() - launchAtMs) > 1200;
      if (blurredAfterLaunch || (isInstagramIab && launched && enoughDelay)) setTimeout(goBack, 150);
    });
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    window.addEventListener('pageshow', function (e) {
      if (e.persisted && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    // Instagram in-app browser can fail to emit blur/visibility after mail compose.
    if (isInstagramIab) {
      setTimeout(function () {
        if (launched && !wentBack) goBack();
      }, 15000);
    }
    var done = document.getElementById('done-return');
    if (done) done.addEventListener('click', function (e) { e.preventDefault(); goBack(); });
  })();
  </script>
