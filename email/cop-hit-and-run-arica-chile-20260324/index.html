%ADculos%20y%20la%20respuesta%20a%20incidentes%20relacionados%20con%20el%20bienestar%20animal%20en%20los%20que%20se%20vean%20implicados%20veh%C3%ADculos%20institucionales.%0A3.%20Abordar%20p%C3%BAblicamente%20este%20caso%2C%20asegurando%20a%20la%20comunidad%20que%20no%20se%20tolerar%C3%A1%20tal%20negligencia%20y%20que%20se%20est%C3%A1n%20tomando%20medidas%20para%20evitar%20que%20se%20repita%20en%20el%20futuro.%0A%0ALa%20historia%20de%20Blanquito%20ha%20tenido%20un%20gran%20impacto%20entre%20los%20defensores%20de%20los%20animales%20y%20los%20ciudadanos%20preocupados%20de%20todo%20el%20mundo.%20Nos%20mantenemos%20unidos%20para%20exigir%20justicia%20y%20un%20cambio%20sist%C3%A9mico%20que%20proteja%20a%20los%20animales%20de%20cualquier%20da%C3%B1o%20y%20garantice%20que%20quienes%20ocupan%20puestos%20de%20autoridad%20mantengan%20los%20m%C3%A1s%20altos%20est%C3%A1ndares%20de%20integridad%20y%20compasi%C3%B3n.%0A%0ASolicitamos%20una%20declaraci%C3%B3n%20p%C3%BAblica%20inmediata%20en%20la%20que%20se%20describan%20las%20medidas%20que%20su%20oficina%20u%20organizaci%C3%B3n%20tomar%C3%A1%20para%20abordar%20este%20asunto.%20El%20mundo%20est%C3%A1%20pendiente%20de%20ello%2C%20y%20no%20descansaremos%20hasta%20que%20se%20haga%20justicia.%0A%0APrueba%20en%20v%C3%ADdeo%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1L9UjinErACrcapyje5vAb_bLWAb5hCE4%2Fview%3Fusp%3Dsharing%0A%0AAtentamente%2C%0A%0A%0A%0AEl%20equipo%20de%20%40HallieForAnimals%0Acontact%40hallieforanimals.org%0A%0A%0A%0A%0ATo%20Whom%20It%20May%20Concern%2C%0A%0AWe%20are%20writing%20to%20bring%20urgent%20attention%20to%20a%20deeply%20troubling%20incident%20that%20occurred%20in%20Arica%2C%20Chile%2C%20where%20a%20defenseless%20dog%20named%20Blanquito%20was%20struck%20by%20a%20Carabineros%20vehicle%20and%20left%20abandoned%20without%20aid.%20This%20act%20of%20negligence%2C%20captured%20on%20CCTV%2C%20shows%20the%20vehicle%20failing%20to%20stop%20despite%20the%20desperate%20pleas%20of%20bystanders.%20Blanquito%2C%20who%20
