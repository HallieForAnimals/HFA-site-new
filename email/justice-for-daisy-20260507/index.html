nd%2For%20unlawful%20destruction%20of%20property%20under%20California%20law.%0A3.%20FULL%20RESTITUTION%20to%20Mr.%20Serna%20of%20the%20approximately%20%24250%20in%20shelter%20fees%20he%20was%20forced%20to%20pay%20to%20retrieve%20his%20surviving%20dog%2C%20Raven%2C%20a%20dog%20that%20was%20removed%20from%20private%20property%20without%20cause%20and%20impounded%20at%20his%20expense.%20That%20Mr.%20Serna%20was%20charged%20any%20amount%20for%20the%20retrieval%20of%20his%20own%20dog%2C%20seized%20from%20his%20own%20yard%20during%20an%20unlawful%20search%2C%20is%20an%20outrage%20that%20compounds%20the%20original%20misconduct.%0A4.%20A%20PUBLIC%20STATEMENT%20from%20the%20Sheriff's%20Department%20confirming%20what%20has%20been%20reported%20by%20KTLA%2C%20that%20the%20stolen%20vehicle%20bore%20no%20connection%20to%20Mr.%20Serna's%20property%2C%20and%20a%20full%20explanation%20of%20what%20legal%20authority%20the%20deputy%20believed%20he%20had%20to%20enter%20that%20yard.%0A%0AThe%20surveillance%20footage%20is%20unambiguous.%20The%20public%20is%20watching%2C%20and%20the%20standard%20of%20accountability%20we%20accept%20here%20will%20set%20the%20precedent%20for%20what%20officers%20in%20this%20county%20believe%20they%20are%20permitted%20to%20do.%0A%0AI%20urge%20you%20to%20act%20swiftly%20and%20transparently.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1BZOUETlAH3u8eum8mUO9jN8FqVb3_rXd%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
    var RETURN_TO = "https://hallieforanimals.org/recent.html";
    var wentBack = false;
    var launched = false;
    var blurredAfterLaunch = false;
    var launchAtMs = 0;
    var ua = navigator.userAgent || '';
    var isInstagramIab = /Instagram/i.test(ua);
    function goMail() {
      var a = document.getElementById('open');
      if (a) {
        try { a.click(); } catch (e) { /* ignore */ }
      }
      try {
        window.location.href = MAILTO;
      } catch (e) {
        try { window.location.assign(MAILTO); } catch (e2) { /* ignore */ }
      }
      launched = true;
      launchAtMs = Date.now();
    }
    setTimeout(goMail, 200);
    function goBack() {
      if (wentBack) return;
      wentBack = true;
      try { location.assign(RETURN_TO); } catch (e) { location.href = RETURN_TO; }
    }
    window.addEventListener('blur', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('pagehide', function () {
      if (launched) blurredAfterLaunch = true;
    });
    window.addEventListener('focus', function () {
      var enoughDelay = launchAtMs > 0 && (Date.now() - launchAtMs) > 1200;
      if (blurredAfterLaunch || (isInstagramIab && launched && enoughDelay)) setTimeout(goBack, 150);
    });
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    window.addEventListener('pageshow', function (e) {
      if (e.persisted && blurredAfterLaunch) setTimeout(goBack, 150);
    });
    // Instagram in-app browser can fail to emit blur/visibility after mail compose.
    if (isInstagramIab) {
      setTimeout(function () {
        if (launched && !wentBack) goBack();
      }, 15000);
    }
    var done = document.getElementById('done-return');
    if (done) done.addEventListener('click', function (e) { e.preventDefault(); goBack(); });
  })();
  </script>
