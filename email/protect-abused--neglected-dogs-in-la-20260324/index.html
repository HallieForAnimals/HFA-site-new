ns%20who%20have%20been%20sounding%20the%20alarm%20for%20years.%0A%0ABeyond%20Skid%20Row%2C%20the%20crisis%20extends%20across%20the%20county.%20In%20San%20Fernando%2C%20a%20pet%20sitter%20allegedly%20strangled%20a%2022-month-old%20American%20Bully%20named%20Chula%20while%20her%20owners%20were%20away.%20In%20La%20Verne%2C%20a%20man%20allegedly%20beat%20his%20family's%20elderly%20corgi-chihuahua%20mix%2C%20Hope%2C%20to%20death%20with%20a%20crowbar%20because%20her%20barking%20disturbed%20his%20sleep.%20In%20another%20case%2C%20a%20man%20allegedly%20dropped%20a%20bulldog%20named%20Adriana%20on%20her%20head%2C%20kicked%20her%2C%20and%20threw%20her%20into%20a%20stack%20of%20tires%2C%20where%20she%20was%20left%20to%20die.%20These%20are%20symptoms%20of%20a%20county%20in%20which%20the%20message%2C%20intentionally%20or%20not%2C%20is%20that%20cruelty%20carries%20no%20real%20consequences.%0A%0AWhen%20advocates%20call%20the%20police%2C%20they%20are%20told%20to%20call%20animal%20control.%20When%20animal%20control%20is%20called%2C%20they%20are%20told%20to%20call%20the%20police.%20Calls%20to%20the%20Mayor's%20office%2C%20LA%20Animal%20Services%2C%20and%20the%20LAPD%20to%20report%20dogs%20being%20beaten%2C%20starved%2C%20neglected%2C%20and%20abandoned%20typically%20go%20unanswered.%20In%20November%202025%2C%20Mayor%20Karen%20Bass%20announced%20a%20dedicated%20task%20force%20to%20address%20animal%20cruelty%20on%20Skid%20Row.%20After%20a%20single%20highly-publicized%20bust%2C%20advocates%20report%20they%20never%20saw%20evidence%20of%20the%20task%20force%20again%2C%20with%20officers%20recorded%20stating%20the%20program%20was%20disbanded%20after%20just%20a%20couple%20of%20trainings.%0A%0ALos%20Angeles%20rules%20prohibit%20dog%20breeding%20when%20animal%20shelters%20exceed%2075%25%20capacity%2C%20a%20threshold%20that%20advocates%20say%20has%20been%20surpassed%20for%20years.%20Dogs%20are%20still%20being%20bred%20and%20sold%20on%20Skid%20Row%20in%20open%20violation%20of%20this%20restriction.%20Meanwhile%2C%20Mayor%20Bass%20has%20proposed%20cutting%20%246.4%20million%20from%20the%20already%20struggling%20LA%20Animal%20Services%20department%20and%20laying%20off%2062%20of%20its%20employees%2C%20this%2C%20in%20a%20city%20whose%20animal%20shelters%20are%20already%20overwhelmed%2C%20understaffed%2C%20and%20euthanizing%20animals%20en%20masse.%0A%0ALet%20us%20be%20clear%20about%20what%20the%20taxpayers%20of%20Los%20Angeles%20are%20funding.%20Mayor%20Karen%20Bass%20draws%20an%20annual%20salary%20of%20approximately%20%24301%2C000.%20Each%20of%20the%20five%20members%20of%20the%20LA%20County%20Board%20of%20Supervisors%20earns%20%24244%2C727%20per%20year%2C%20a%20collective%20salary%20bill%20for%20that%20body%20alone%20of%20over%20%241.2%20million%20annually.%20These%20are%20the%20people%20elected%20and%20paid%20to%20govern%20this%20city%20and%20county.%20For%20that%20level%20of%20public%20investment%2C%20the%20very%20least%20Angelenos%2C%20and%20indeed%20a%20watching%20world%2C%20should%20expect%20is%20the%20basic%20enforcement%20of%20laws%20that%20already%20exist.%20California%20Penal%20Code%20597%20prohibits%20animal%20cruelty.%20The%20laws%20are%20written.%20The%20budgets%20are%20allocated.%20The%20salaries%20are%20paid.%20What%20is%20absent%20is%20the%20will%20to%20act.%0A%0AWe%20demand%20the%20following%3A%0A%0A1.%20Real%2C%20sustained%20enforcement%20on%20Skid%20Row%20and%20across%20LA%20County%2C%20not%20press%20releases%2C%20not%20pilot%20programs%20that%20vanish%20after%20one%20action%2C%20but%20a%20permanent%2C%20properly%20resourced%20unit%20with%20the%20authority%20and%20mandate%20to%20investigate%2C%20seize%20animals%20in%20danger%2C%20and%20refer%20cases%20for%20prosecution.%20Results%20must%20be%20measurable%20and%20publicly%20reported.%0A%0A2.%20Immediate%20reversal%20of%20proposed%20cuts%20to%20LA%20Animal%20Services%20and%20a%20commitment%20to%20increase%2C%20not%20reduce%2C%20staffing%20and%20resources%20at%20a%20time%20when%20shelters%20are%20overwhelmed%2C%20and%20animals%20across%20the%20county%20are%20dying%20from%20neglect.%0A%0A3.%20Consistent%20prosecution%20under%20California%20Penal%20Code%20597%2C%20regardless%20of%20ZIP%20code%20or%20housing%20status.%20Cruelty%20is%20cruelty.%20The%20law%20does%20not%20make%20exceptions%2C%20and%20neither%20should%20those%20paid%20to%20enforce%20it.%0A%0A4.%20Transparent%2C%20publicly%20accessible%20reporting%20on%20animal%20cruelty%20complaints%2C%20response%20times%2C%20enforcement%20actions%2C%20and%20outcomes%20across%20the%20county%2C%20so%20that%20residents%20can%20hold%20you%20accountable%20for%20the%20results%2C%20not%20just%20the%20announcements.%0A%0A5.%20Use%20of%20your%20public%20platforms%20to%20make%20unambiguously%20clear%20that%20animal%20cruelty%20in%20Los%20Angeles%20will%20not%20be%20tolerated%2C%20and%20that%20those%20responsible%20will%20face%20real%20legal%20consequences.%0A%0AThe%20suffering%20taking%20place%20on%20the%20streets%20of%20this%20city%20is%20not%20a%20secret.%20It%20is%20filmed%20daily%2C%20reported%20by%20credible%20news%20outlets%2C%20documented%20by%20rescue%20volunteers%2C%20and%20witnessed%20by%20thousands.%20The%20question%20is%20no%20longer%20whether%20it%20is%20happening.%20The%20question%20is%20why%20those%20being%20paid%20hundreds%20of%20thousands%20of%20dollars%20in%20public%20funds%20are%20allowing%20it%20to%20continue.%0A%0AWe%20are%20watching.%20We%20are%20organized.%20And%20we%20will%20not%20stop%20until%20the%20animals%20of%20Los%20Angeles%20County%20receive%20the%20protection%20they%20deserve%20are%20owed%20under%20the%20law.%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org https://hallieforanimals.org/ongoing.html#c-protect-abused--neglected-dogs-in-la-20260324 https://hallieforanimals.org/ongoing.html#c-protect-abused--neglected-dogs-in-la-20260324 (same as return) "mailto:Karen.Bass@lacity.org,nhochman@da.lacounty.gov,hydee.feldsteinsoto@lacity.org,curtis.watts@laci 0time%20when%20shelters%20are%20overwhelmed%2C%20and%20animals%20across%20the%20county%20are%20dying%20from%20neglect.%0A%0A3.%20Consistent%20prosecution%20under%20California%20Penal%20Code%20597%2C%20regardless%20of%20ZIP%20code%20or%20housing%20status.%20Cruelty%20is%20cruelty.%20The%20law%20does%20not%20make%20exceptions%2C%20and%20neither%20should%20those%20paid%20to%20enforce%20it.%0A%0A4.%20Transparent%2C%20publicly%20accessible%20reporting%20on%20animal%20cruelty%20complaints%2C%20response%20times%2C%20enforcement%20actions%2C%20and%20outcomes%20across%20the%20county%2C%20so%20that%20residents%20can%20hold%20you%20accountable%20for%20the%20results%2C%20not%20just%20the%20announcements.%0A%0A5.%20Use%20of%20your%20public%20platforms%20to%20make%20unambiguously%20clear%20that%20animal%20cruelty%20in%20Los%20Angeles%20will%20not%20be%20tolerated%2C%20and%20that%20those%20responsible%20will%20face%20real%20legal%20consequences.%0A%0AThe%20suffering%20taking%20place%20on%20the%20streets%20of%20this%20city%20is%20not%20a%20secret.%20It%20is%20filmed%20daily%2C%20reported%20by%20credible%20news%20outlets%2C%20documented%20by%20rescue%20volunteers%2C%20and%20witnessed%20by%20thousands.%20The%20question%20is%20no%20longer%20whether%20it%20is%20happening.%20The%20question%20is%20why%20those%20being%20paid%20hundreds%20of%20thousands%20of%20dollars%20in%20public%20funds%20are%20allowing%20it%20to%20continue.%0A%0AWe%20are%20watching.%20We%20are%20organized.%20And%20we%20will%20not%20stop%20until%20the%20animals%20of%20Los%20Angeles%20County%20receive%20the%20protection%20they%20deserve%20are%20owed%20under%20the%20law.%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org" rel="nofollow">Open email</a>
