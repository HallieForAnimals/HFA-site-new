0acceptable%2C%20and%20rather%20than%20investigate%20the%20welfare%20of%20suffering%20animals%2C%20they're%20instead%20pursuing%20a%20warrant%20to%20identify%20the%20individual%20who%20recorded%20the%20footage%2C%20with%20a%20view%20to%20charging%20them%20with%20trespassing.%0A%0AIf%20a%20child%20were%20found%20in%20equivalent%20conditions%2C%20no%20water%2C%20restrained%20from%20drinking%2C%20confined%20without%20adequate%20care%2C%20no%20authority%20in%20the%20civilized%20world%20would%20prosecute%20the%20person%20who%20filmed%20it.%20The%20act%20of%20exposure%20would%20be%20considered%20courageous%2C%20not%20criminal.%20These%20animals%20deserve%20no%20less%20consideration.%0A%0AIreland%20positions%20itself%20as%20a%20nation%20of%20animal%20lovers.%20And%20yet%2C%20it%20appears%20that%20as%20long%20as%20an%20animal%20generates%20revenue%2C%20its%20suffering%20is%20treated%20as%20acceptable%20collateral.%20Wales%20and%20Scotland%20have%20both%20moved%20to%20ban%20greyhound%20racing%20precisely%20because%20of%20the%20systemic%20neglect%20and%20abuse%20that%20accompanies%20the%20industry.%20Ireland%20must%20now%20ask%20itself%20what%20kind%20of%20nation%20it%20wishes%20to%20be.%0A%0AWe%20are%20calling%20on%20you%20to%3A%0A%0A1.%20Ensure%20an%20independent%20welfare%20inspection%20is%20conducted%20immediately%20at%20the%20location%20near%20Parteen%2C%20Co.%20Clare%2C%20by%20a%20body%20with%20no%20financial%20ties%20to%20the%20greyhound%20racing%20industry.%0A2.%20Halt%20any%20legal%20proceedings%20against%20the%20individual%20who%20recorded%20the%20footage.%20Whistleblowers%20exposing%20animal%20cruelty%20should%20be%20protected%2C%20not%20prosecuted.%0A3.%20Launch%20an%20urgent%20review%20into%20the%20conflict%20of%20interest%20inherent%20in%20GRI%20conducting%20welfare%20inspections%20on%20racing%20greyhounds.%0A4.%20Consider%20legislative%20action%20in%20line%20with%20Wales%20and%20Scotland%2C%20where%20greyhound%20racing%20has%20been%20banned%20due%20to%20endemic%20welfare%20failures.%0A%0AThese%20animals%20cannot%20speak.%20We%20must.%0A%0AWe%20expect%20a%20public%20statement%20response%2C%20and%20we%20expect%20action.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1T2tFLsdH4UoGtQCZrYrXBK9PFvRxawSp%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org https://hallieforanimals.org/recent.html#c-neglected-greyhounds-near-parteen-ireland-20260326 https://hallieforanimals.org/recent.html#c-neglected-greyhounds-near-parteen-ireland-20260326 (same as return) "mailto:info@ispca.ie,oireachtasqueries@grireland.ie,barry.coleman@grireland.ie,pr@grireland.ie,animalwelfare@agriculture.gov.ie,helpline@ispca.ie,donna.mcgettigan@oireachtas.ie,joe.cooney@oireachtas.ie,timmy.dooley@oireachtas.ie,cathal.crowe@oireachtas.ie?subject=Greyhound%20Welfare%20Crisis%20Near%20Parteen%2C%20Co.%20Clare&cc=editor@clarechampion.ie,jgalvin@clarechampion.ie,cmcgann@clarechampion.ie,investigations@rte.ie,cianan.brennan@examiner.ie,news@examiner.ie,editor@examiner.ie,hello@thejournal.ie,news@irishtimes.com,kevin.osullivan@irishtimes.com&body=To%20whom%20it%20may%20concern%2C%0A%0AWe're%20writing%20to%20formally%20raise%20the%20alarm%20regarding%20the%20welfare%20of%20greyhounds%20being%20kept%20in%20what%20can%20only%20be%20described%20as%20deplorable%20conditions%20at%20a%20location%20near%20Parteen%2C%20County%20Clare.%20Video%20evidence%20has%20been%20recorded%20documenting%20these%20conditions%2C%20including%20dogs%20without%20access%20to%20water%20and%2C%20critically%2C%20at%20least%20one%20dog%20wearing%20a%20muzzle%2C%20physically%20preventing%20it%20from%20drinking%20even%20if%20water%20were%20available.%20This%20isn't%20a%20matter%20of%20opinion%2C%20it's%20documented%20suffering.%0A%0AWhat's%20deeply%20troubling%20isn't%20only%20the%20condition%20of%20these%20animals%2C%20but%20the%20institutional%20failure%20surrounding%20them%3A%0A%0A%E2%80%94%20Two%20inspectors%20 0acceptable%2C%20and%20rather%20than%20investigate%20the%20welfare%20of%20suffering%20animals%2C%20they're%20instead%20pursuing%20a%20warrant%20to%20identify%20the%20individual%20who%20recorded%20the%20footage%2C%20with%20a%20view%20to%20charging%20them%20with%20trespassing.%0A%0AIf%20a%20child%20were%20found%20in%20equivalent%20conditions%2C%20no%20water%2C%20restrained%20from%20drinking%2C%20confined%20without%20adequate%20care%2C%20no%20authority%20in%20the%20civilized%20world%20would%20prosecute%20the%20person%20who%20filmed%20it.%20The%20act%20of%20exposure%20would%20be%20considered%20courageous%2C%20not%20criminal.%20These%20animals%20deserve%20no%20less%20consideration.%0A%0AIreland%20positions%20itself%20as%20a%20nation%20of%20animal%20lovers.%20And%20yet%2C%20it%20appears%20that%20as%20long%20as%20an%20animal%20generates%20revenue%2C%20its%20suffering%20is%20treated%20as%20acceptable%20collateral.%20Wales%20and%20Scotland%20have%20both%20moved%20to%20ban%20greyhound%20racing%20precisely%20because%20of%20the%20systemic%20neglect%20and%20abuse%20that%20accompanies%20the%20industry.%20Ireland%20must%20now%20ask%20itself%20what%20kind%20of%20nation%20it%20wishes%20to%20be.%0A%0AWe%20are%20calling%20on%20you%20to%3A%0A%0A1.%20Ensure%20an%20independent%20welfare%20inspection%20is%20conducted%20immediately%20at%20the%20location%20near%20Parteen%2C%20Co.%20Clare%2C%20by%20a%20body%20with%20no%20financial%20ties%20to%20the%20greyhound%20racing%20industry.%0A2.%20Halt%20any%20legal%20proceedings%20against%20the%20individual%20who%20recorded%20the%20footage.%20Whistleblowers%20exposing%20animal%20cruelty%20should%20be%20protected%2C%20not%20prosecuted.%0A3.%20Launch%20an%20urgent%20review%20into%20the%20conflict%20of%20interest%20inherent%20in%20GRI%20conducting%20welfare%20inspections%20on%20racing%20greyhounds.%0A4.%20Consider%20legislative%20action%20in%20line%20with%20Wales%20and%20Scotland%2C%20where%20greyhound%20racing%20has%20been%20banned%20due%20to%20endemic%20welfare%20failures.%0A%0AThese%20animals%20cannot%20speak.%20We%20must.%0A%0AWe%20expect%20a%20public%20statement%20response%2C%20and%20we%20expect%20action.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1T2tFLsdH4UoGtQCZrYrXBK9PFvRxawSp%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org";
