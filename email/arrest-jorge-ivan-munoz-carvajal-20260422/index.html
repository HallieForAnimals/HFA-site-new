3%ADa)%2C%20incluyendo%20todas%20las%20sanciones%20aplicables%2C%20tales%20como%20multas%2C%20inhabilitaci%C3%B3n%20de%20por%20vida%20para%20tener%20animales%20y%20cualquier%20sanci%C3%B3n%20privativa%20de%20libertad%20que%20justifique%20la%20gravedad%20de%20las%20lesiones%20y%20las%20pruebas%20(incluidos%20los%20videos%20de%20los%20vecinos%20y%20el%20testimonio%20de%20testigos%20oculares).%0A%0AEste%20caso%20ha%20provocado%20una%20indignaci%C3%B3n%20p%C3%BAblica%20generalizada%20debido%20a%20la%20brutalidad%20clara%20y%20documentada%20que%20implica.%20Es%20esencial%20una%20aplicaci%C3%B3n%20firme%20y%20r%C3%A1pida%20de%20la%20ley%20para%20proteger%20a%20los%20animales%2C%20disuadir%20de%20futuras%20infracciones%20y%20defender%20el%20esp%C3%ADritu%20de%20las%20leyes%20de%20protecci%C3%B3n%20animal%20de%20Chile.%0A%0APruebas%20en%20v%C3%ADdeo%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1EBif_GBTcvJ8c_ue8aWj8Gl5XAqSQsCd%2Fview%3Fusp%3Dsharing%0A%0AAtentamente%2C%0A%0A%0A%0AEquipo%20de%20%40HallieForAnimals%0Acontact%40hallieforanimals.org%0A%0A%0A%0A%0ATo%20whom%20it%20may%20concern%2C%0A%0AI%20am%20writing%20as%20a%20concerned%20citizen%20to%20follow%20up%20on%20the%20serious%20case%20of%20animal%20cruelty%20that%20occurred%20on%20April%2020%2C%202026%2C%20at%20Apartment%20108%2C%20Condominio%20Cumbres%20de%20Hualp%C3%A9n%20(Crist%C3%B3bal%20Col%C3%B3n%208551).%0A%0AI%20understand%20that%20the%20PDI%20BIDEMA%20is%20conducting%20an%20investigation%20and%20that%20the%20Municipality%20of%20Hualp%C3%A9n%20has%20filed%20a%20querella%2C%20with%20the%20three%20dogs%20having%20been%20removed%20from%20the%20premises.%20While%20these%20initial%20steps%20are%20appreciated%2C%20I%20respectfully%20urge%20the%20following%20immediate%20and%20decisive%20actions%3A%0A%0A1%3A%20The%20immediate%20location%20and%20arrest%20of%20the%20identified%20perpetrator%2C%20Jorge%20Iv%C3%A1n%20Mu%C3%B1oz%20Carvajal%20(RUT%2013.382.743-9)%2C%20for%20the%20violent%20throwing%20and%20mistreatment%20of%20the%20dogs%20that%20caused%20fractures%20and%20severe%20back%20injuries.%0A2%3A%20A%20permanent%20prohibition%20on%20returning%20any%20of%20the%20three%20dogs%20to%20this%20individual%2C%20placing%20them%20instead%20in%20protective%20custody%20or%20suitable%20foster%2Fadoptive%20homes%20to%20ensure%20their%20safety.%0A3%3A%20Full%20prosecution%20to%20the%20maximum%20extent%20of%20the%20law%20under%20Ley%2021.020%20(Tenencia%20Responsable%20de%20Mascotas%20y%20Animales%20de%20Compa%C3%B1%C3%ADa)%2C%20including%20all%20applicable%20penalties%20such%20as%20fines%2C%20lifetime%20disqualification%20from%20owning%20animals%2C%20and%20any%20custodial%20sanctions%20warranted%20by%20the%20severity%20of%20the%20injuries%20and%20evidence%20(including%20neighbor%20videos%20and%20eyewitness%20testimony).%0A%0AThis%20case%20has%20caused%20widespread%20public%20outrage%20due%20to%20the%20clear%20and%20documented%20brutality%20involved.%20Strong%20and%20swift%20enforcement%20is%20essential%20to%20protect%20the%20animals%2C%20deter%20future%20offenses%2C%20and%20uphold%20the%20intent%20of%20Chile%E2%80%99s%20animal%20protection%20laws.%0A%0AVideo%20evidence%3A%20https%3A%2F%2Fdrive.google.com%2Ffile%2Fd%2F1EBif_GBTcvJ8c_ue8aWj8Gl5XAqSQsCd%2Fview%3Fusp%3Dsharing%0A%0ASincerely%2C%0A%0A%0A%0A%40HallieForAnimals%20Team%0Acontact%40hallieforanimals.org" rel="nofollow">Open email</a>
